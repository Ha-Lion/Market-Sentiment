<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ha-Lion Market Sentiment Dashboard</title>
  <link rel="icon" type="image/png" href="logo.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #05070b;
      color: #e6edf3;
      margin: 0;
      padding: 28px;
    }

    .top-area {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-box {
      display: inline-block;
      background: #05070b;
      padding: 8px;
      border-radius: 22px;
      box-shadow: 0 0 40px rgba(218, 165, 32, 0.25);
    }

    .logo {
      width: 175px;
      height: 175px;
      object-fit: contain;
      display: block;
      border-radius: 20px;
      background: #05070b;
    }

    h1 {
      color: #58a6ff;
      text-align: center;
      margin: 20px 0 8px 0;
      font-size: 32px;
      letter-spacing: 1px;
    }

    .updated {
      color: #8b949e;
      text-align: center;
      margin-bottom: 22px;
      font-size: 15px;
    }

    .filters {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    select {
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px 16px;
      min-width: 260px;
      font-size: 15px;
      outline: none;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 20px;
    }

    .summary-box p {
      margin: 0 0 12px 0;
      line-height: 1.5;
    }

    .overall-vote {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .Bullish {
      color: #3fb950;
      font-weight: bold;
    }

    .Bearish {
      color: #f85149;
      font-weight: bold;
    }

    .Mixed {
      color: #d29922;
      font-weight: bold;
    }

    .Neutral,
    .MixedNeutral {
      color: #8b949e;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border-bottom: 1px solid #30363d;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #ffffff;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .headline-item {
      margin-bottom: 15px;
      line-height: 1.45;
      padding-bottom: 10px;
      border-bottom: 1px solid #30363d;
    }

    .headline-source {
      font-weight: bold;
      color: #e6edf3;
    }

    .headline-tags {
      margin-top: 4px;
      font-size: 12px;
      color: #8b949e;
    }

    .count-note {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .filter-summary {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
    }

    .footer-note {
      text-align: center;
      color: #8b949e;
      font-size: 13px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="top-area">
    <div class="logo-box">
      <img src="logo.png" alt="Ha-Lion Logo" class="logo">
    </div>

    <h1>Ha-Lion Market Sentiment Dashboard</h1>
    <div class="updated" id="updated">Loading...</div>
  </div>

  <div class="filters">
    <select id="marketFilter">
      <option value="all">All Markets</option>
      <option value="indexes">Indexes / Futures</option>
      <option value="forex">Forex / Currencies</option>
      <option value="crypto">Crypto</option>
      <option value="commodities">Commodities</option>
      <option value="oil">Oil / Energy</option>
      <option value="gold">Gold / Metals</option>
      <option value="macro">Macro / Fed / Inflation</option>
    </select>

    <select id="instrumentFilter">
      <option value="all">All Instruments</option>
    </select>
  </div>

  <div class="card">
    <h2>Market Summary</h2>
    <div class="filter-summary" id="filter_summary">Loading filtered summary...</div>
    <div class="summary-box">
      <div class="overall-vote" id="overall_vote">Loading...</div>
      <div id="summary">Loading...</div>
    </div>
  </div>

  <div class="card">
    <h2>Source Votes</h2>
    <div class="count-note" id="source_count"></div>
    <table>
      <thead>
        <tr>
          <th>Source</th>
          <th>Vote</th>
          <th>Impact</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="sources"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Top Headlines</h2>
    <div class="count-note" id="headline_count"></div>
    <div id="headlines">Loading...</div>
  </div>

  <div class="footer-note">
    Powered by Ha-Lion Market Sentiment Engine
  </div>

  <script>
    let dashboardData = null;

    const instrumentMap = {
      all: [
        ["all", "All Instruments"]
      ],
      indexes: [
        ["all", "All Indexes / Futures"],
        ["S&P 500 / ES", "S&P 500 / ES"],
        ["Nasdaq / NQ", "Nasdaq / NQ"],
        ["Dow / YM", "Dow / YM"],
        ["Russell / RTY", "Russell / RTY"],
        ["VIX", "VIX / Volatility"]
      ],
      forex: [
        ["all", "All Forex"],
        ["US Dollar / DXY", "US Dollar / DXY"],
        ["EUR / EURUSD", "EUR / EURUSD"],
        ["GBP / GBPUSD", "GBP / GBPUSD"],
        ["JPY / USDJPY", "JPY / USDJPY"],
        ["CHF / USDCHF", "CHF / USDCHF"],
        ["CAD / USDCAD", "CAD / USDCAD"],
        ["AUD / AUDUSD", "AUD / AUDUSD"],
        ["NZD / NZDUSD", "NZD / NZDUSD"]
      ],
      crypto: [
        ["all", "All Crypto"],
        ["Bitcoin / BTC", "Bitcoin / BTC"],
        ["Ethereum / ETH", "Ethereum / ETH"],
        ["General Crypto", "General Crypto"]
      ],
      commodities: [
        ["all", "All Commodities"],
        ["Gold", "Gold"],
        ["Silver", "Silver"],
        ["Copper", "Copper"],
        ["Crude Oil", "Crude Oil"],
        ["Natural Gas", "Natural Gas"]
      ],
      oil: [
        ["all", "All Oil / Energy"],
        ["Crude Oil", "Crude Oil"],
        ["Natural Gas", "Natural Gas"]
      ],
      gold: [
        ["all", "All Gold / Metals"],
        ["Gold", "Gold"],
        ["Silver", "Silver"],
        ["Copper", "Copper"]
      ],
      macro: [
        ["all", "All Macro"],
        ["Fed / FOMC", "Fed / FOMC"],
        ["CPI / Inflation", "CPI / Inflation"],
        ["PPI", "PPI"],
        ["Jobs / NFP", "Jobs / NFP"],
        ["GDP", "GDP"],
        ["Treasury Yields", "Treasury Yields"],
        ["Geopolitical / Tariffs", "Geopolitical / Tariffs"]
      ]
    };

    function voteClass(vote) {
      return (vote || "Neutral").replace("/", "").replace(" ", "");
    }

    function populateInstrumentDropdown() {
      const market = document.getElementById("marketFilter").value;
      const instrumentSelect = document.getElementById("instrumentFilter");

      instrumentSelect.innerHTML = "";

      const list = instrumentMap[market] || instrumentMap.all;

      list.forEach(item => {
        const option = document.createElement("option");
        option.value = item[0];
        option.textContent = item[1];
        instrumentSelect.appendChild(option);
      });
    }

    function headlineMatches(item, market, instrument) {
      if (market === "all" && instrument === "all") return true;

      const markets = item.markets || [];
      const instruments = item.instruments || [];

      if (instrument !== "all") {
        return instruments.includes(instrument);
      }

      if (market !== "all") {
        return markets.includes(market);
      }

      return true;
    }

    function calculateFilteredSummary(headlines) {
      if (!headlines.length) {
        return {
          vote: "Neutral",
          text: "No matching headlines were found for this selected market or instrument in the latest scan."
        };
      }

      let bullish = 0;
      let bearish = 0;
      let neutral = 0;
      let high = 0;

      headlines.forEach(h => {
        if (h.vote === "Bullish") bullish++;
        else if (h.vote === "Bearish") bearish++;
        else neutral++;

        if (h.impact === "High") high++;
      });

      let vote = "Neutral";
      let tone = "The selected area is mixed to neutral.";

      if (bullish > bearish) {
        vote = "Bullish";
        tone = "The selected area is leaning bullish.";
      } else if (bearish > bullish) {
        vote = "Bearish";
        tone = "The selected area is leaning bearish.";
      } else if (bullish > 0 && bearish > 0) {
        vote = "Mixed";
        tone = "The selected area is mixed.";
      }

      return {
        vote: vote,
        text: tone + " Filtered headlines show " + bullish + " bullish, " + bearish + " bearish, and " + neutral + " neutral readings. " + high + " matching headlines are high impact."
      };
    }

    function renderDashboard() {
      if (!dashboardData) return;

      const market = document.getElementById("marketFilter").value;
      const instrument = document.getElementById("instrumentFilter").value;

      document.getElementById("updated").innerText =
        "Last update: " + (dashboardData.updated_ny || dashboardData.updated_utc);

      const filteredHeadlines = dashboardData.top_headlines.filter(item =>
        headlineMatches(item, market, instrument)
      );

      const filteredSummary = calculateFilteredSummary(filteredHeadlines);

      document.getElementById("filter_summary").innerHTML =
        '<b>Filtered Sentiment: <span class="' + voteClass(filteredSummary.vote) + '">' +
        filteredSummary.vote + '</span></b><br>' + filteredSummary.text;

      const overallVote = dashboardData.overall_vote || "Neutral";

      document.getElementById("overall_vote").innerHTML =
        'Overall Market Sentiment: <span class="' + voteClass(overallVote) + '">' + overallVote + '</span>';

      document.getElementById("summary").innerHTML =
        dashboardData.summary.map(item => "<p>" + item + "</p>").join("");

      const activeSources = new Set(filteredHeadlines.map(item => item.source));

      let filteredSources = dashboardData.sources;

      if (market !== "all" || instrument !== "all") {
        filteredSources = dashboardData.sources.filter(source =>
          activeSources.has(source.name)
        );
      }

      document.getElementById("source_count").innerText =
        "Showing " + filteredSources.length + " source(s).";

      document.getElementById("sources").innerHTML =
        filteredSources.length
          ? filteredSources.map(source => `
              <tr>
                <td><a href="${source.url}" target="_blank">${source.name}</a></td>
                <td class="${voteClass(source.vote)}">${source.vote}</td>
                <td>${source.impact}</td>
                <td>${source.status}</td>
              </tr>
            `).join("")
          : "<tr><td colspan='4'>No sources matched this filter.</td></tr>";

      document.getElementById("headline_count").innerText =
        "Showing " + filteredHeadlines.length + " headline(s).";

      document.getElementById("headlines").innerHTML =
        filteredHeadlines.length
          ? filteredHeadlines.map(item => `
              <div class="headline-item">
                <span class="headline-source">${item.source}:</span>
                <a href="${item.link}" target="_blank">${item.title}</a>
                <div class="headline-tags">
                  Vote: <span class="${voteClass(item.vote)}">${item.vote}</span>
                  | Impact: ${item.impact}
                  | Markets: ${(item.markets || []).join(", ")}
                  | Instruments: ${(item.instruments || []).join(", ")}
                </div>
              </div>
            `).join("")
          : "<p>No headlines matched this filter in the latest scan.</p>";
    }

    document.getElementById("marketFilter").addEventListener("change", () => {
      populateInstrumentDropdown();
      renderDashboard();
    });

    document.getElementById("instrumentFilter").addEventListener("change", renderDashboard);

    fetch("dashboard_data.json?t=" + Date.now())
      .then(response => response.json())
      .then(data => {
        dashboardData = data;
        populateInstrumentDropdown();
        renderDashboard();
      })
      .catch(error => {
        document.getElementById("updated").innerText = "Could not load dashboard data";
        document.getElementById("overall_vote").innerText = "Error loading overall sentiment";
        document.getElementById("summary").innerText = "Could not load summary";
        document.getElementById("sources").innerHTML =
          "<tr><td colspan='4'>Could not load source votes</td></tr>";
        document.getElementById("headlines").innerText = "Could not load headlines";
      });
  </script>
</body>
</html>
