<!DOCTYPE html>
<html>
<head>
  <title>Market Sentiment Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0d1117; color:#e6edf3; margin:30px; }
    h1 { color:#58a6ff; }
    .card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:20px; margin-bottom:20px; }
    .small { color:#8b949e; }
    .Bullish { color:#3fb950; font-weight:bold; }
    .Bearish { color:#f85149; font-weight:bold; }
    .Mixed { color:#d29922; font-weight:bold; }
    .Neutral { color:#8b949e; font-weight:bold; }
    table { width:100%; border-collapse:collapse; }
    th, td { border-bottom:1px solid #30363d; padding:10px; text-align:left; }
    a { color:#58a6ff; text-decoration:none; }
  </style>
</head>
<body>
  <h1>Market Sentiment Dashboard</h1>
  <p class="small" id="updated">Loading...</p>

  <div class="card">
    <h2>Market Summary</h2>
    <div id="summary">Loading...</div>
  </div>

  <div class="card">
    <h2>Source Votes</h2>
    <table>
      <thead>
        <tr>
          <th>Source</th>
          <th>Vote</th>
          <th>Impact</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="sources"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Top Headlines</h2>
    <div id="headlines">Loading...</div>
  </div>

  <script>
    fetch("dashboard_data.json?t=" + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById("updated").innerText = "Last update: " + data.updated_utc;

        document.getElementById("summary").innerHTML =
          data.summary.map(s => "<p>" + s + "</p>").join("");

        document.getElementById("sources").innerHTML =
          data.sources.map(s => `
            <tr>
              <td><a href="${s.url}" target="_blank">${s.name}</a></td>
              <td class="${s.vote}">${s.vote}</td>
              <td>${s.impact}</td>
              <td>${s.status}</td>
            </tr>
          `).join("");

        document.getElementById("headlines").innerHTML =
          data.top_headlines.map(h => `
            <p><b>${h.source}:</b> <a href="${h.link}" target="_blank">${h.title}</a></p>
          `).join("");
      })
      .catch(err => {
        document.getElementById("summary").innerText = "Could not load dashboard_data.json";
      });
  </script>
</body>
</html>
